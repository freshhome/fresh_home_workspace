name: shared_features
description: "حزمة المميزات المشتركة - تحتوي على واجهات الميزات القابلة لإعادة الاستخدام"
version: 0.0.1
publish_to: none


environment:
  sdk: ^3.10.3
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter

  # ---------------------------------------------------------
  # الحزم المحلية (Local Packages)
  # ---------------------------------------------------------
  shared:
    path: ../shared

  # ---------------------------------------------------------
  # سوبا بيز والبنية التحتية (Supabase & Infrastructure)
  # ---------------------------------------------------------
  supabase_flutter: ^2.8.1
  json_annotation: ^4.9.0

  # ---------------------------------------------------------
  # إدارة الحالة والمنطق (State Management & Logic)
  # ---------------------------------------------------------
  flutter_bloc: ^9.1.1
  get_it: ^9.2.0
  equatable: ^2.0.8
  fpdart: ^1.2.0

  # ---------------------------------------------------------
  # الملاحة والتوجيه (Navigation)
  # ---------------------------------------------------------
  go_router: ^17.1.0

  # ---------------------------------------------------------
  # واجهة المستخدم والتفاعلات (UI & Animations)
  # ---------------------------------------------------------
  flutter_svg: ^2.2.3
  lottie: ^3.3.2
  hive_flutter: ^1.1.0

  # ---------------------------------------------------------
  # الهوية والخدمات (Identity & Services)
  # ---------------------------------------------------------
  firebase_core: ^3.10.1
  firebase_messaging: ^15.2.1
  flutter_local_notifications: ^17.2.0
  uuid: ^4.5.3


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  json_serializable: ^6.7.1
  build_runner: ^2.4.15

flutter:
  # الحزمة حالياً لا تحتوي على أصول خاصة بها، يتم استخدام أصول حزمة shared
