name: fresh_home_customer
description: "تطبيق Fresh Home للعملاء - الواجهة الجديدة لخدمة العملاء"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter

  # ---------------------------------------------------------
  # الحزم المحلية (Local Packages)
  # ---------------------------------------------------------
  shared:
    path: ../../packages/shared
  shared_features:
    path: ../../packages/shared_features

  # ---------------------------------------------------------
  # تم إضافة equatable لحل مشاكل التبعيات
  # ---------------------------------------------------------
  equatable: ^2.0.8

  # ---------------------------------------------------------
  # الملاحة وإدارة الحالة (Navigation & DI)
  # ---------------------------------------------------------
  flutter_bloc: ^9.1.1
  go_router: ^17.1.0
  get_it: ^9.2.0
  intl: ^0.20.2
  fpdart: ^1.2.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.1

  # ---------------------------------------------------------
  # فيربيز وخدمات الإشعارات (Firebase & FCM)
  # ---------------------------------------------------------
  firebase_core: ^3.10.1
  firebase_messaging: ^15.2.1
  flutter_local_notifications: ^17.2.0

  cupertino_icons: ^1.0.8
  cached_network_image: ^3.4.1
  supabase_flutter: ^2.8.1
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.2

flutter:
  uses-material-design: true

# ---------------------------------------------------------
# أيقونات التطبيق (Launcher Icons)
# ---------------------------------------------------------
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "../../packages/shared/assets/core/images/app_icon_customer.png"
  adaptive_icon_background: "#F5F7FA"
  adaptive_icon_foreground: "../../packages/shared/assets/core/images/app_icon_customer.png"
